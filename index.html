<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>CMG 골프클럽 순위 시스템</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/firebase/10.12.2/firebase-app-compat.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/firebase/10.12.2/firebase-database-compat.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
/* 기존 전체 스타일 그대로 사용 (위에 제공된 스타일 그대로) */
</style>
</head>
<body>
<div id="toast"></div>
<div class="app-header"> ... </div>

<!-- 탭 (기존 + 팀편성) -->
<div class="tab-nav">
  <button class="tab-btn active" onclick="switchTab('room')" id="tab-room"><span class="icon">⛳</span>경기안내</button>
  <button class="tab-btn" onclick="switchTab('list')" id="tab-list"><span class="icon">👥</span>참가자</button>
  <button class="tab-btn" onclick="switchTab('score')" id="tab-score"><span class="icon">✏️</span>참가자등록</button>
  <button class="tab-btn" onclick="switchTab('rank')" id="tab-rank"><span class="icon">🏆</span>순위</button>
  <button class="tab-btn" onclick="switchTab('team')" id="tab-team"><span class="icon">🧑‍🤝‍🧑</span>팀편성</button>
  <button class="tab-btn" onclick="switchTab('admin')" id="tab-admin"><span class="icon">⚙️</span>관리자</button>
</div>

<!-- page-score (친타수 안내 추가) -->
<div class="page" id="page-score">
  <div class="card">
    <div class="card-title">내 정보</div>
    
    <div class="field">
      <label>이름</label>
      <input id="pName" placeholder="이름을 입력하세요" autocomplete="off">
    </div>
    
    <div class="field-row">
      <!-- 핸디캡 -->
      <div class="field"> ... </div>
      <!-- 친타수 -->
      <div class="field">
        <label>친타수</label>
        <div style="display:flex; gap:6px;">
          <button type="button" class="btn btn-gray" style="flex:0 0 35px; padding:0; font-size:24px; font-weight:bold; border-radius:var(--radius-sm);" onclick="toggleMinus('pScore')">-</button>
          <input id="pScore" type="text" inputmode="numeric" placeholder="예: 82" style="flex:1;">
        </div>
      </div>
    </div>

    <!-- ★★★ 친타수 안내 문구 추가 ★★★ -->
    <div style="background:#fef2f2; border:1px solid #fecaca; color:#b91c1c; font-size:11px; padding:8px 12px; border-radius:8px; margin:8px 0 12px;">
      ※ <strong>친타수는 경기 종료 후</strong> 입력해주세요
    </div>

    <!-- 성별 선택 -->
    <div class="field">
      <label>성별</label>
      <div class="btn-row" style="gap:8px;">
        <button type="button" id="btnGenderM" class="btn btn-green btn-sm" onclick="selectGender('M')" style="flex:1;">♂ 남자</button>
        <button type="button" id="btnGenderF" class="btn btn-gray btn-sm" onclick="selectGender('F')" style="flex:1;">♀ 여자</button>
      </div>
    </div>

    <div class="btn-row" style="margin-top:4px">
      <button class="btn btn-gray btn-sm" onclick="loadMyData()">불러오기</button>
      <button class="btn btn-green btn-sm" onclick="saveMyScore()">저장하기</button>
    </div>
    <div id="scoreNotice" style="display:none" class="notice"></div>
  </div>
</div>

<!-- page-team (관리자만 편성 가능하게 수정) -->
<div class="page" id="page-team">
  <div class="card">
    <div class="card-title">자동 팀 편성</div>
    <div style="font-size:13px; color:var(--text-2); line-height:1.7; margin-bottom:12px;">
      • 4명씩 팀 구성<br>
      • 각 팀에 여성 최소 1명 배정<br>
      • 핸디캡 최대한 비슷하게 편성
    </div>
    
    <!-- ★★★ 관리자만 활성화 ★★★ -->
    <button class="btn btn-green" id="teamFormBtn" onclick="autoFormTeams()">🚀 자동 팀 편성 실행</button>
    <div id="teamAdminNote" style="display:none; font-size:11px; color:#b91c1c; margin-top:6px;">
      관리자만 팀을 편성할 수 있습니다
    </div>
    
    <div id="teamNotice" class="notice" style="display:none; margin-top:10px;"></div>
  </div>

  <div class="card">
    <div class="card-title">현재 편성된 팀</div>
    <div id="teamsDisplay"> ... </div>
  </div>
</div>

<!-- page-admin (팀 관리 섹션 추가) -->
<div class="page" id="page-admin">
  <div id="adminLocked"> ... </div>
  
  <div id="adminUnlocked" style="display:none">
    <!-- 기존 내용 + 아래 팀 관리 섹션 추가 -->
    
    <div class="admin-section" style="border-color:#c9a84c; background:#fdf6e3;">
      <div class="card-title" style="color:#c9a84c;">🧑‍🤝‍🧑 팀 관리 (관리자 전용)</div>
      <button class="btn btn-gold btn-sm" onclick="autoFormTeams()" style="margin-bottom:8px;">🚀 자동 팀 편성 실행</button>
      <div style="font-size:12px; color:#92400e;">
        팀 편성은 관리자만 가능합니다.<br>
        편성 후 참가자들에게 자동으로 공유됩니다.
      </div>
    </div>
    
    <!-- 기존 admin 섹션들 ... -->
  </div>
</div>

<script>
// ==================== 기존 코드 + 수정된 부분 ====================

let selectedGender = 'M';

// 성별 선택 함수 (기존과 동일)
function selectGender(gender) {
  selectedGender = gender;
  const btnM = document.getElementById('btnGenderM');
  const btnF = document.getElementById('btnGenderF');
  if (btnM && btnF) {
    btnM.className = gender === 'M' ? 'btn btn-green btn-sm' : 'btn btn-gray btn-sm';
    btnF.className = gender === 'F' ? 'btn btn-green btn-sm' : 'btn btn-gray btn-sm';
  }
}

// ★★★ 저장 후 참가자 화면으로 자동 이동 ★★★
function saveMyScore() {
  // ... 기존 검증 코드 (이름, 핸디, gender 등) ...

  if (useFirebase) {
    db.ref("rooms/" + currentRoom + "/players/" + name).set({
      name: name,
      handi: handi,
      score: score,
      gender: selectedGender,
      timestamp: timestamp
    }).then(() => {
      showNotice(notice, "info", hasScore ? "스코어 저장 완료!" : "사전 등록 완료!");
      if (hasScore) {
        document.getElementById("myNetCard").style.display = "block";
        document.getElementById("myNetDisplay").textContent = net;
      }
      // ★★★ 저장 성공 후 참가자 탭으로 자동 이동 ★★★
      setTimeout(() => {
        switchTab('list');
      }, 800);
    });
  } else {
    // local 모드도 동일하게 이동
    setTimeout(() => switchTab('list'), 800);
  }
}

// ★★★ 관리자만 팀 편성 가능하도록 수정 ★★★
function autoFormTeams() {
  if (!admin) {
    toast("🔒 관리자만 팀을 편성할 수 있습니다");
    return;
  }
  
  // 기존 팀 편성 로직 그대로 (4명 단위, 여성 배정, 핸디 밸런싱)
  // ... (이전 버전의 autoFormTeams 함수 내용 그대로 사용)
  
  // 편성 후 Firebase 저장
  if (useFirebase && currentRoom) {
    db.ref("rooms/" + currentRoom + "/teams").set(teams);
  }
  
  toast("✅ 팀 편성이 완료되었습니다!");
  renderTeams(teams);
}

// 팀 페이지 진입 시 버튼 상태 제어
function switchTab(tab) {
  // 기존 switchTab 코드 ...
  if (tab === 'team') {
    const btn = document.getElementById('teamFormBtn');
    const note = document.getElementById('teamAdminNote');
    if (btn && note) {
      if (admin) {
        btn.disabled = false;
        btn.style.opacity = '1';
        note.style.display = 'none';
      } else {
        btn.disabled = true;
        btn.style.opacity = '0.5';
        note.style.display = 'block';
      }
    }
  }
}

// listenRoom에서 teams 불러와서 표시 (기존 + 추가)
function listenRoom() {
  db.ref("rooms/" + currentRoom).on("value", function(snap) {
    // 기존 코드 ...
    const teams = room.teams;
    if (teams && document.getElementById('teamsDisplay')) {
      renderTeams(teams);
    }
  });
}

// 초기 로드 시 gender 버튼 + admin 체크
window.addEventListener("DOMContentLoaded", function() {
  // 기존 코드 ...
  const btnM = document.getElementById('btnGenderM');
  if (btnM) btnM.className = 'btn btn-green btn-sm';
});
</script>
</body>
</html>
