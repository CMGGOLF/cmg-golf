<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>CMG 골프클럽 순위 시스템</title>

<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>
:root {
  --green: #1a6b3a;
  --green-light: #e8f5ee;
  --green-mid: #2d8a50;
  --gold: #c9a84c;
  --gold-light: #fdf6e3;
  --silver: #8a9bb0;
  --bronze: #b87333;
  --bg: #f4f6f4;
  --surface: #ffffff;
  --border: #e2e8e2;
  --text: #1a2318;
  --text-2: #4a5a48;
  --text-3: #7a8a78;
  --radius: 14px;
  --radius-sm: 8px;
  --shadow: 0 2px 12px rgba(26,107,58,0.08);
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

body {
  font-family: 'Noto Sans KR', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
}

/* ── HEADER ── */
.app-header {
  background: var(--green);
  color: white;
  padding: 20px 16px 16px;
  padding-top: calc(20px + env(safe-area-inset-top));
  text-align: center;
  position: sticky;
  top: 0;
  z-index: 100;
}
.app-header h1 {
  font-size: 18px;
  font-weight: 700;
  letter-spacing: -0.01em;
}
.app-header .sub {
  font-size: 12px;
  opacity: 0.7;
  margin-top: 2px;
  font-family: 'DM Mono', monospace;
}
.room-badge {
  display: inline-block;
  background: rgba(255,255,255,0.18);
  border: 1px solid rgba(255,255,255,0.3);
  border-radius: 20px;
  padding: 3px 12px;
  font-size: 12px;
  font-family: 'DM Mono', monospace;
  margin-top: 6px;
}

/* ── TAB NAV ── */
.tab-nav {
  display: flex;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  position: sticky;
  top: 76px;
  z-index: 99;
}
.tab-btn {
  flex: 1;
  padding: 13px 8px;
  font-size: 13px;
  font-weight: 500;
  color: var(--text-3);
  background: none;
  border: none;
  border-bottom: 2px solid transparent;
  cursor: pointer;
  font-family: 'Noto Sans KR', sans-serif;
  transition: all 0.2s;
}
.tab-btn.active {
  color: var(--green);
  border-bottom-color: var(--green);
}
.tab-btn .icon { display: block; font-size: 18px; margin-bottom: 2px; }

/* ── PAGES ── */
.page { display: none; padding: 16px; padding-bottom: 100px; }
.page.active { display: block; }

/* ── CARD ── */
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 18px;
  margin-bottom: 14px;
  box-shadow: var(--shadow);
}
.card-title {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--text-3);
  margin-bottom: 14px;
}

/* ── FORM ── */
.field { margin-bottom: 14px; }
.field:last-child { margin-bottom: 0; }
.field label {
  display: block;
  font-size: 12px;
  color: var(--text-3);
  margin-bottom: 5px;
  font-weight: 500;
}
.field input {
  width: 100%;
  padding: 12px 14px;
  font-size: 16px;
  font-family: 'Noto Sans KR', sans-serif;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  background: #fafafa;
  color: var(--text);
  transition: border-color 0.2s, box-shadow 0.2s;
}
.field input:focus {
  outline: none;
  border-color: var(--green-mid);
  box-shadow: 0 0 0 3px rgba(45,138,80,0.1);
  background: white;
}
.field-row { display: flex; gap: 10px; }
.field-row .field { flex: 1; }

/* ── BUTTONS ── */
.btn {
  width: 100%;
  padding: 14px;
  font-size: 15px;
  font-weight: 700;
  font-family: 'Noto Sans KR', sans-serif;
  border: none;
  border-radius: var(--radius-sm);
  cursor: pointer;
  transition: transform 0.1s, opacity 0.2s;
  letter-spacing: -0.01em;
}
.btn:active { transform: scale(0.97); }
.btn-green { background: var(--green); color: white; }
.btn-green-outline { background: white; color: var(--green); border: 1.5px solid var(--green); }
.btn-gray { background: #f0f2f0; color: var(--text-2); }
.btn-dark { background: var(--text); color: white; }
.btn-gold { background: var(--gold); color: white; }
.btn-danger { background: #fee2e2; color: #b91c1c; }
.btn-sm { padding: 10px 14px; font-size: 14px; }
.btn-row { display: flex; gap: 10px; }
.btn-row .btn { flex: 1; }

/* ── NOTICE ── */
.notice {
  font-size: 12px;
  padding: 8px 12px;
  border-radius: var(--radius-sm);
  margin-top: 10px;
}
.notice-warn { background: #fff8e6; color: #92400e; border: 1px solid #fde68a; }
.notice-info { background: var(--green-light); color: var(--green); border: 1px solid #a7d7b8; }
.notice-error { background: #fee2e2; color: #b91c1c; border: 1px solid #fecaca; }

/* ── QR ── */
.qr-wrap {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
  padding: 14px 0 4px;
}
.qr-label { font-size: 12px; color: var(--text-3); }

/* ── STATUS BAR ── */
.status-bar {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 10px 14px;
  border-radius: var(--radius-sm);
  font-size: 13px;
  font-weight: 500;
  margin-bottom: 14px;
}
.status-pending { background: #fff8e6; color: #92400e; border: 1px solid #fde68a; }
.status-preview { background: #eff6ff; color: #1d4ed8; border: 1px solid #bfdbfe; }
.status-live { background: var(--green-light); color: var(--green); border: 1px solid #a7d7b8; }

/* ── RANK LIST ── */
.rank-list { display: flex; flex-direction: column; gap: 8px; }

.rank-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 14px 16px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  animation: slideIn 0.3s ease both;
}
.rank-item:nth-child(1) { animation-delay: 0s; }
.rank-item:nth-child(2) { animation-delay: 0.05s; }
.rank-item:nth-child(3) { animation-delay: 0.1s; }
.rank-item:nth-child(n+4) { animation-delay: 0.15s; }

@keyframes slideIn {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}

.rank-item.rank-1 { border-color: var(--gold); background: var(--gold-light); }
.rank-item.rank-2 { border-color: var(--silver); background: #f8f9fa; }
.rank-item.rank-3 { border-color: var(--bronze); background: #fdf5ef; }

.rank-num {
  font-family: 'DM Mono', monospace;
  font-size: 20px;
  font-weight: 500;
  width: 36px;
  text-align: center;
  color: var(--text-3);
}
.rank-num.n1 { color: var(--gold); }
.rank-num.n2 { color: var(--silver); }
.rank-num.n3 { color: var(--bronze); }

.rank-info { flex: 1; min-width: 0; }
.rank-name {
  font-size: 16px;
  font-weight: 700;
  color: var(--text);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.rank-detail {
  font-size: 12px;
  color: var(--text-3);
  margin-top: 2px;
  font-family: 'DM Mono', monospace;
}

.rank-score {
  text-align: right;
}
.rank-net {
  font-family: 'DM Mono', monospace;
  font-size: 20px;
  font-weight: 500;
  color: var(--text);
}
.rank-net-label { font-size: 11px; color: var(--text-3); }

.medal { font-size: 22px; }

/* ── ADMIN PREVIEW ── */
.preview-tag {
  display: inline-block;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  background: #eff6ff;
  color: #1d4ed8;
  border: 1px solid #bfdbfe;
  border-radius: 4px;
  padding: 2px 6px;
  margin-left: 6px;
  vertical-align: middle;
}

/* ── EMPTY STATE ── */
.empty-state {
  text-align: center;
  padding: 40px 20px;
  color: var(--text-3);
}
.empty-state .big { font-size: 40px; margin-bottom: 12px; }
.empty-state p { font-size: 14px; line-height: 1.7; }

/* ── ADMIN SECTION ── */
.admin-section {
  border: 1.5px dashed var(--green-mid);
  border-radius: var(--radius);
  padding: 16px;
  margin-bottom: 14px;
  background: var(--green-light);
}
.admin-section .card-title { color: var(--green); }

.divider {
  height: 1px;
  background: var(--border);
  margin: 14px 0;
}

/* ── PUBLISH STATE ── */
.publish-state {
  text-align: center;
  padding: 20px;
}
.publish-state .big-icon { font-size: 48px; margin-bottom: 10px; }
.publish-state h2 { font-size: 18px; font-weight: 700; margin-bottom: 6px; }
.publish-state p { font-size: 13px; color: var(--text-3); }

/* ── STICKY BOTTOM ── */
.sticky-bottom {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  padding: 10px 16px;
  padding-bottom: calc(10px + env(safe-area-inset-bottom));
  background: var(--surface);
  border-top: 1px solid var(--border);
  box-shadow: 0 -4px 16px rgba(0,0,0,0.06);
  z-index: 200;
}

/* ── MODAL ── */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.5);
  z-index: 999;
  display: flex;
  align-items: flex-end;
  opacity: 0;
  transition: opacity 0.25s;
  pointer-events: none;
}
.modal-overlay.open { opacity: 1; pointer-events: all; }
.modal-sheet {
  width: 10
