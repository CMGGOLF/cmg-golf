<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>CMG 골프클럽 순위 시스템</title>

<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>
:root {
  --green: #1a6b3a; --green-light: #e8f5ee; --green-mid: #2d8a50;
  --gold: #c9a84c; --gold-light: #fdf6e3; --silver: #8a9bb0; --bronze: #b87333;
  --bg: #f4f6f4; --surface: #ffffff; --border: #e2e8e2;
  --text: #1a2318; --text-2: #4a5a48; --text-3: #7a8a78;
  --radius: 14px; --radius-sm: 8px; --shadow: 0 2px 12px rgba(26,107,58,0.08);
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { font-family: 'Noto Sans KR', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
.app-header { background: var(--green); color: white; padding: 20px 16px 16px; text-align: center; position: sticky; top: 0; z-index: 100; }
.app-header h1 { font-size: 18px; font-weight: 700; }
.app-header .sub { font-size: 12px; opacity: 0.7; margin-top: 2px; }
.room-badge { display: inline-block; background: rgba(255,255,255,0.18); border: 1px solid rgba(255,255,255,0.3); border-radius: 20px; padding: 3px 12px; font-size: 12px; margin-top: 6px; }
.tab-nav { display: flex; background: var(--surface); border-bottom: 1px solid var(--border); position: sticky; top: 76px; z-index: 99; }
.tab-btn { flex: 1; padding: 13px 8px; font-size: 13px; font-weight: 500; color: var(--text-3); background: none; border: none; border-bottom: 2px solid transparent; cursor: pointer; }
.tab-btn.active { color: var(--green); border-bottom-color: var(--green); }
.page { display: none; padding: 16px; padding-bottom: 100px; }
.page.active { display: block; }
.card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 18px; margin-bottom: 14px; box-shadow: var(--shadow); }
.card-title { font-size: 11px; font-weight: 700; text-transform: uppercase; color: var(--text-3); margin-bottom: 14px; }
.field { margin-bottom: 14px; }
.field label { display: block; font-size: 12px; color: var(--text-3); margin-bottom: 5px; }
.field input { width: 100%; padding: 12px 14px; font-size: 16px; border: 1px solid var(--border); border-radius: var(--radius-sm); background: #fafafa; }
.field input:focus { outline: none; border-color: var(--green-mid); background: white; }
.field-row { display: flex; gap: 10px; }
.field-row .field { flex: 1; }
.btn { width: 100%; padding: 14px; font-size: 15px; font-weight: 700; border: none; border-radius: var(--radius-sm); cursor: pointer; transition: transform 0.1s; }
.btn:active { transform: scale(0.97); }
.btn-green { background: var(--green); color: white; }
.btn-green-outline { background: white; color: var(--green); border: 1.5px solid var(--green); }
.btn-gray { background: #f0f2f0; color: var(--text-2); }
.notice { font-size: 12px; padding: 8px 12px; border-radius: var(--radius-sm); margin-top: 10px; }
.notice-info { background: var(--green-light); color: var(--green); border: 1px solid #a7d7b8; }
.notice-error { background: #fee2e2; color: #b91c1c; border: 1px solid #fecaca; }
.qr-wrap { display: flex; flex-direction: column; align-items: center; gap: 8px; padding: 14px 0 4px; }
.status-bar { padding: 10px 14px; border-radius: var(--radius-sm); font-size: 13px; font-weight: 500; margin-bottom: 14px; }
.status-pending { background: #fff8e6; color: #92400e; border: 1px solid #fde68a; }
.status-live { background: var(--green-light); color: var(--green); border: 1px solid #a7d7b8; }
.rank-list { display: flex; flex-direction: column; gap: 8px; }
.rank-item { display: flex; align-items: center; gap: 12px; padding: 14px 16px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-sm); }
.rank-num { font-family: 'DM Mono', monospace; font-size: 18px; width: 30px; text-align: center; color: var(--text-3); }
.rank-info { flex: 1; min-width: 0; }
.rank-name { font-size: 16px; font-weight: 700; }
.rank-detail { font-size: 11px; color: var(--text-3); margin-top: 2px; }
.rank-score { text-align: right; }
.rank-net { font-family: 'DM Mono', monospace; font-size: 18px; font-weight: 700; color: var(--text); }
#toast { position: fixed; top: 90px; left: 50%; transform: translateX(-50%); background: #333; color: white; padding: 10px 20px; border-radius: 100px; font-size: 14px; z-index: 9999; opacity: 0; transition: 0.3s; pointer-events: none; }
#toast.show { opacity: 1; transform: translateX(-50%) translateY(10px); }
.sticky-bottom { position: fixed; bottom: 0; left: 0; right: 0; padding: 10px 16px; background: white; border-top: 1px solid var(--border); z-index: 200; }
</style>
</head>
<body>

<div id="toast"></div>

<div class="app-header">
  <h1>⛳ CMG 골프클럽</h1>
  <div class="sub">실시간 순위 시스템</div>
  <div id="roomBadge" style="display:none"><div class="room-badge" id="roomBadgeText"></div></div>
</div>

<div class="tab-nav">
  <button class="tab-btn active" onclick="switchTab('room')" id="tab-room">🏠경기방</button>
  <button class="tab-btn" onclick="switchTab('score')" id="tab-score">✏️점수입력</button>
  <button class="tab-btn" onclick="switchTab('rank')" id="tab-rank">🏆순위</button>
  <button class="tab-btn" onclick="switchTab('admin')" id="tab-admin">⚙️관리자</button>
</div>

<div class="page active" id="page-room">
  <div class="card">
    <div class="card-title">경기방 설정</div>
    <div class="field"><label>방 이름</label><input id="roomInput" placeholder="예: 2026-04-09 대회"></div>
    <div class="btn-row" style="display:flex; gap:10px;">
      <button class="btn btn-green-outline" onclick="createRoom()">방 생성</button>
      <button class="btn btn-green" onclick="joinRoom()">입장</button>
    </div>
  </div>
  <div class="card" id="qrCard" style="display:none">
    <div class="card-title">참가자 초대 QR</div>
    <div class="qr-wrap"><div id="qr"></div></div>
  </div>
</div>

<div class="page" id="page-score">
  <div class="card">
    <div class="card-title">내 정보 (사전 등록/수정)</div>
    <div class="field"><label>이름</label><input id="pName" placeholder="이름을 입력하세요"></div>
    <div class="field-row">
      <div class="field"><label>핸디캡</label><input id="pHandi" type="number" placeholder="0"></div>
      <div class="field"><label>총타수 (경기 후 입력)</label><input id="pScore" type="number" placeholder="0"></div>
    </div>
    <button class="btn btn-green" onclick="saveMyScore()">데이터 저장/업데이트</button>
    <div id="scoreNotice" style="display:none" class="notice"></div>
  </div>
</div>

<div class="page" id="page-rank">
  <div id="rankStatusBar"></div>
  <div id="rankList"></div>
</div>

<div class="page" id="page-admin">
  <div id="adminLocked">
    <div class="card">
      <div class="card-title">관리자 인증</div>
      <input id="adminPw" type="password" style="width:100%; padding:12px; margin-bottom:10px;" placeholder="비밀번호 입력">
      <button class="btn btn-green" onclick="unlockAdmin()">인증하기</button>
    </div>
  </div>
  <div id="adminUnlocked" style="display:none">
    <div class="card">
      <div class="card-title">순위 공개 제어</div>
      <button class="btn btn-green" style="margin-bottom:10px;" onclick="adminPublish(true)">🚀 순위 전체 공개</button>
      <button class="btn btn-gray" onclick="adminPublish(false)">🔒 순위 숨기기</button>
    </div>
    <div class="card">
      <div class="card-title">참가자 데이터</div>
      <div id="adminPlayerList"></div>
    </div>
  </div>
</div>

<script>
// --- Firebase 설정 (반드시 본인의 정보로 채우세요) ---
const firebaseConfig = {
  apiKey: "AIzaSyAXrZPMhTZXdj5uJufyj3ZyS5wbOiZfU9Y",
  authDomain: "cmg-golf.firebaseapp.com",
  databaseURL: "https://cmg-golf-default-rtdb.firebaseio.com",
  projectId: "cmg-golf",
  storageBucket: "cmg-golf.firebasestorage.app",
  messagingSenderId: "1081371409280",
  appId: "1:1081371409280:web:3b813b1a9cc4806f701f65",
  measurementId: "G-7TGYE2GL3P"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();
let admin = false; let currentRoom = ""; let localData = {}; let published = false;

function switchTab(tab) {
  document.querySelectorAll(".page").forEach(p => p.classList.remove("active"));
  document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
  document.getElementById("page-" + tab).classList.add("active");
  document.getElementById("tab-" + tab).classList.add("active");
}

function toast(msg) {
  const el = document.getElementById("toast");
  el.textContent = msg; el.classList.add("show");
  setTimeout(() => el.classList.remove("show"), 2000);
}

// [수정됨] 관리자만 방 생성 가능
function createRoom() {
  if (!admin) { toast("관리자 인증이 필요합니다."); return; }
  const name = document.getElementById("roomInput").value.trim();
  if (!name) return toast("방 이름을 입력하세요.");
  currentRoom = name;
  db.ref("rooms/" + currentRoom + "/meta").set({ published: false });
  toast("방 생성 완료!");
  document.getElementById("qrCard").style.display = "block";
  new QRCode(document.getElementById("qr"), location.href.split("?")[0] + "?room=" + encodeURIComponent(currentRoom));
  updateRoomBadge();
}

function joinRoom() {
  const name = document.getElementById("roomInput").value.trim();
  if (!name) return toast("방 이름을 입력하세요.");
  currentRoom = name; listenRoom(); updateRoomBadge(); toast("방 입장 완료!");
}

function updateRoomBadge() {
  document.getElementById("roomBadge").style.display = "block";
  document.getElementById("roomBadgeText").textContent = "📍 " + currentRoom;
}

// [수정됨] 사전 등록 지원: 점수(score) 없이도 저장 가능
function saveMyScore() {
  const name = document.getElementById("pName").value.trim();
  const handi = Number(document.getElementById("pHandi").value) || 0;
  const score = Number(document.getElementById("pScore").value) || 0;
  const notice = document.getElementById("scoreNotice");

  if (!currentRoom) return toast("방에 먼저 입장하세요.");
  if (!name) return toast("이름을 입력하세요.");

  db.ref("rooms/" + currentRoom + "/players/" + name).set({ name, handi, score })
    .then(() => {
      const msg = score > 0 ? "스코어 저장 완료!" : "사전 등록 완료!";
      showNotice(notice, "info", msg);
      if (navigator.vibrate) navigator.vibrate(30);
    });
}

function showNotice(el, type, msg) {
  el.style.display = "block"; el.className = "notice notice-" + type; el.textContent = msg;
  setTimeout(() => { el.style.display = "none"; }, 3000);
}

function listenRoom() {
  db.ref("rooms/" + currentRoom).on("value", snap => {
    const data = snap.val() || {};
    published = data.meta ? data.meta.published : false;
    localData = data.players || {};
    renderRank();
    if(admin) refreshAdminList();
  });
}

function renderRank() {
  const listEl = document.getElementById("rankList");
  const statusEl = document.getElementById("rankStatusBar");
  const players = Object.values(localData);

  if (!published && !admin) {
    statusEl.innerHTML = `<div class="status-bar status-pending">⏳ 순위 집계 중 (참가자 명단 공개)</div>`;
    listEl.innerHTML = players.map(p => `
      <div class="rank-item">
        <div class="rank-num">👤</div>
        <div class="rank-info"><div class="rank-name">${p.name}</div><div class="rank-detail">핸디캡: ${p.handi}</div></div>
        <div class="rank-score"><div style="font-size:12px; color:var(--green)">${p.score > 0 ? '입력완료' : '대기중'}</div></div>
      </div>
    `).join("");
    return;
  }

  statusEl.innerHTML = `<div class="status-bar status-live">🏆 최종 순위</div>`;
  players.forEach(p => p.net = p.score - p.handi);
  players.sort((a,b) => (a.score === 0 ? 1 : b.score === 0 ? -1 : a.net - b.net));
  
  listEl.innerHTML = players.map((p, i) => `
    <div class="rank-item">
      <div class="rank-num">${p.score > 0 ? i+1 : '-'}</div>
      <div class="rank-info"><div class="rank-name">${p.name}</div><div class="rank-detail">총타 ${p.score} - 핸디 ${p.handi}</div></div>
      <div class="rank-score"><div class="rank-net">${p.score > 0 ? p.net : '미입력'}</div></div>
    </div>
  `).join("");
}

function unlockAdmin() {
  if (document.getElementById("adminPw").value === "1217") {
    admin = true;
    document.getElementById("adminLocked").style.display = "none";
    document.getElementById("adminUnlocked").style.display = "block";
    renderRank();
    if(currentRoom) refreshAdminList();
  } else toast("비밀번호 오류");
}

function adminPublish(state) {
  db.ref("rooms/" + currentRoom + "/meta/published").set(state);
  toast(state ? "순위가 공개되었습니다." : "순위를 숨겼습니다.");
}

function refreshAdminList() {
  const el = document.getElementById("adminPlayerList");
  el.innerHTML = Object.values(localData).map(p => `
    <div style="font-size:13px; padding:5px 0; border-bottom:1px solid #eee;">
      ${p.name} (H:${p.handi} / G:${p.score})
    </div>
  `).join("");
}

const urlRoom = new URLSearchParams(location.search).get("room");
if (urlRoom) {
  document.getElementById("roomInput").value = urlRoom;
  joinRoom();
}
</script>
</body>
</html>
