<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>CMG 골프클럽 순위 시스템</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/firebase/10.12.2/firebase-app-compat.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/firebase/10.12.2/firebase-database-compat.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
/* 기존 스타일 그대로 유지 */
:root { --green: #1a6b3a; --green-light: #e8f5ee; --green-mid: #2d8a50; --gold: #c9a84c; --gold-light: #fdf6e3; --silver: #8a9bb0; --bronze: #b87333; --bg: #f4f6f4; --surface: #ffffff; --border: #e2e8e2; --text: #1a2318; --text-2: #4a5a48; --text-3: #7a8a78; --radius: 14px; --radius-sm: 8px; --shadow: 0 2px 12px rgba(26,107,58,0.08); }
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { font-family: 'Noto Sans KR', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
.app-header { background: var(--green); color: white; padding: 20px 16px 16px; padding-top: calc(20px + env(safe-area-inset-top)); text-align: center; position: sticky; top: 0; z-index: 100; }
.app-header h1 { font-size: 18px; font-weight: 700; letter-spacing: -0.01em; }
.app-header .sub { font-size: 12px; opacity: 0.7; margin-top: 2px; font-family: 'DM Mono', monospace; }
.room-badge { display: inline-block; background: rgba(255,255,255,0.18); border: 1px solid rgba(255,255,255,0.3); border-radius: 20px; padding: 3px 12px; font-size: 12px; font-family: 'DM Mono', monospace; margin-top: 6px; }
.tab-nav { display: flex; background: var(--surface); border-bottom: 1px solid var(--border); position: sticky; top: 76px; z-index: 99; }
.tab-btn { flex: 1; padding: 13px 4px; font-size: 12px; font-weight: 500; color: var(--text-3); background: none; border: none; border-bottom: 2px solid transparent; cursor: pointer; transition: all 0.2s; }
.tab-btn.active { color: var(--green); border-bottom-color: var(--green); }
.tab-btn .icon { display: block; font-size: 18px; margin-bottom: 2px; }
.page { display: none; padding: 16px; padding-bottom: 100px; }
.page.active { display: block; }
.card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 18px; margin-bottom: 14px; box-shadow: var(--shadow); }
.card-title { font-size: 11px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text-3); margin-bottom: 14px; }
.field { margin-bottom: 14px; }
.field:last-child { margin-bottom: 0; }
.field label { display: block; font-size: 12px; color: var(--text-3); margin-bottom: 5px; font-weight: 500; }
.field input { width: 100%; padding: 12px 14px; font-size: 16px; font-family: 'Noto Sans KR', sans-serif; border: 1px solid var(--border); border-radius: var(--radius-sm); background: #fafafa; color: var(--text); transition: 0.2s; }
.field input:focus { outline: none; border-color: var(--green-mid); box-shadow: 0 0 0 3px rgba(45,138,80,0.1); background: white; }
.field input.input-error { border-color: #b91c1c; box-shadow: 0 0 0 3px rgba(185,28,28,0.1); }
.field-row { display: flex; gap: 10px; }
.field-row .field { flex: 1; min-width: 0; }
.btn { width: 100%; padding: 14px; font-size: 15px; font-weight: 700; border: none; border-radius: var(--radius-sm); cursor: pointer; transition: transform 0.1s; }
.btn:active { transform: scale(0.97); }
.btn-green { background: var(--green); color: white; }
.btn-green-outline { background: white; color: var(--green); border: 1.5px solid var(--green); }
.btn-gray { background: #f0f2f0; color: var(--text-2); }
.btn-dark { background: var(--text); color: white; }
.btn-gold { background: var(--gold); color: white; }
.btn-danger { background: #fee2e2; color: #b91c1c; }
.btn-sm { padding: 10px 14px; font-size: 14px; }
.btn-row { display: flex; gap: 10px; }
.btn-row .btn { flex: 1; }
.notice { font-size: 12px; padding: 8px 12px; border-radius: var(--radius-sm); margin-top: 10px; }
.notice-warn { background: #fff8e6; color: #92400e; border: 1px solid #fde68a; }
.notice-info { background: var(--green-light); color: var(--green); border: 1px solid #a7d7b8; }
.notice-error { background: #fee2e2; color: #b91c1c; border: 1px solid #fecaca; }
.qr-wrap { display: flex; flex-direction: column; align-items: center; gap: 8px; padding: 14px 0 4px; }
.qr-label { font-size: 12px; color: var(--text-3); }
.status-bar { display: flex; align-items: center; gap: 8px; padding: 10px 14px; border-radius: var(--radius-sm); font-size: 13px; font-weight: 500; margin-bottom: 14px; }
.status-pending { background: #fff8e6; color: #92400e; border: 1px solid #fde68a; }
.status-preview { background: #eff6ff; color: #1d4ed8; border: 1px solid #bfdbfe; }
.status-live { background: var(--green-light); color: var(--green); border: 1px solid #a7d7b8; }
.rank-list { display: flex; flex-direction: column; gap: 8px; }
.rank-item { display: flex; align-items: center; gap: 12px; padding: 14px 16px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-sm); animation: slideIn 0.3s ease both; }
@keyframes slideIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
.rank-item.rank-1 { border-color: var(--gold); background: var(--gold-light); }
.rank-item.rank-2 { border-color: var(--silver); background: #f8f9fa; }
.rank-item.rank-3 { border-color: var(--bronze); background: #fdf5ef; }
.rank-num { font-family: 'DM Mono', monospace; font-size: 20px; font-weight: 500; width: 36px; text-align: center; color: var(--text-3); }
.rank-num.n1 { color: var(--gold); } .rank-num.n2 { color: var(--silver); } .rank-num.n3 { color: var(--bronze); }
.rank-info { flex: 1; min-width: 0; }
.rank-name { font-size: 16px; font-weight: 700; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.rank-detail { font-size: 12px; color: var(--text-3); margin-top: 2px; font-family: 'DM Mono', monospace; }
.rank-score { text-align: right; }
.rank-net { font-family: 'DM Mono', monospace; font-size: 20px; font-weight: 500; color: var(--text); }
.rank-net-label { font-size: 11px; color: var(--text-3); }
.medal { font-size: 22px; }
.preview-tag { display: inline-block; font-size: 10px; font-weight: 700; background: #eff6ff; color: #1d4ed8; border: 1px solid #bfdbfe; border-radius: 4px; padding: 2px 6px; margin-left: 6px; vertical-align: middle; }
.empty-state { text-align: center; padding: 40px 20px; color: var(--text-3); }
.empty-state .big { font-size: 40px; margin-bottom: 12px; }
.empty-state p { font-size: 14px; line-height: 1.7; }
.admin-section { border: 1.5px dashed var(--green-mid); border-radius: var(--radius); padding: 16px; margin-bottom: 14px; background: var(--green-light); }
.admin-section .card-title { color: var(--green); }
.sticky-bottom { position: fixed; bottom: 0; left: 0; right: 0; padding: 10px 16px; padding-bottom: calc(10px + env(safe-area-inset-bottom)); background: var(--surface); border-top: 1px solid var(--border); box-shadow: 0 -4px 16px rgba(0,0,0,0.06); z-index: 200; }
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 999; display: flex; align-items: flex-end; opacity: 0; transition: 0.25s; pointer-events: none; }
.modal-overlay.open { opacity: 1; pointer-events: all; }
.modal-sheet { width: 100%; max-width: 480px; margin: 0 auto; background: white; border-radius: 20px 20px 0 0; padding: 20px 20px calc(20px + env(safe-area-inset-bottom)); transform: translateY(100%); transition: 0.3s cubic-bezier(0.32, 0.72, 0, 1); }
.modal-overlay.open .modal-sheet { transform: translateY(0); }
.modal-handle { width: 40px; height: 4px; background: #ddd; border-radius: 2px; margin: 0 auto 18px; }
.modal-title { font-size: 18px; font-weight: 700; margin-bottom: 16px; }
#toast { position: fixed; top: 90px; left: 50%; transform: translateX(-50%) translateY(-10px); background: var(--text); color: white; padding: 10px 20px; border-radius: 100px; font-size: 14px; font-weight: 500; white-space: nowrap; z-index: 9999; opacity: 0; transition: all 0.3s; pointer-events: none; }
#toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>
<div id="toast"></div>
<div class="app-header">
  <h1>⛳ CMG 골프클럽</h1>
  <div class="sub">대회 참가자 핸디관리 시스템</div>
  <div id="roomBadge" style="display:none">
    <div class="room-badge" id="roomBadgeText"></div>
  </div>
</div>
<div class="tab-nav">
  <button class="tab-btn active" onclick="switchTab('room')" id="tab-room"><span class="icon">⛳</span>경기안내</button>
  <button class="tab-btn" onclick="switchTab('list')" id="tab-list"><span class="icon">👥</span>참가자</button>
  <button class="tab-btn" onclick="switchTab('score')" id="tab-score"><span class="icon">✏️</span>참가자등록</button>
  <button class="tab-btn" onclick="switchTab('rank')" id="tab-rank"><span class="icon">🏆</span>순위</button>
  <button class="tab-btn" onclick="switchTab('admin')" id="tab-admin"><span class="icon">⚙️</span>관리자</button>
</div>

<!-- 기존 페이지들 그대로 유지 -->
<div class="page active" id="page-room"> ... (기존 그대로) </div>
<div class="page" id="page-list"> ... (기존 그대로) </div>

<!-- 참가자등록 페이지 (성별 + 친타수 안내 추가) -->
<div class="page" id="page-score">
  <div class="card">
    <div class="card-title">내 정보</div>
    <div class="field">
      <label>이름</label>
      <input id="pName" placeholder="이름을 입력하세요" autocomplete="off">
    </div>
    <div class="field-row">
      <div class="field">
        <label>핸디캡 <span style="color:#b91c1c; font-size:11px;">(최대 14)</span></label>
        <div style="display:flex; gap:6px;">
          <button type="button" class="btn btn-gray" style="flex:0 0 35px; padding:0; font-size:24px; font-weight:bold; border-radius:var(--radius-sm);" onclick="toggleMinus('pHandi')">-</button>
          <input id="pHandi" type="text" inputmode="decimal" placeholder="예: 7.6" style="flex:1;" oninput="validateHandi(this)">
        </div>
        <div id="handiError" style="display:none; font-size:11px; color:#b91c1c; margin-top:4px;">⚠ 핸디캡은 최대 14까지만 입력 가능합니다</div>
      </div>
      <div class="field">
        <label>친타수</label>
        <div style="display:flex; gap:6px;">
          <button type="button" class="btn btn-gray" style="flex:0 0 35px; padding:0; font-size:24px; font-weight:bold; border-radius:var(--radius-sm);" onclick="toggleMinus('pScore')">-</button>
          <input id="pScore" type="text" inputmode="numeric" placeholder="예: 82" style="flex:1;">
        </div>
      </div>
    </div>

    <!-- ★ 친타수 안내 추가 -->
    <div style="background:#fef2f2; border:1px solid #fecaca; color:#b91c1c; font-size:11px; padding:8px 12px; border-radius:8px; margin:8px 0 12px;">
      ※ <strong>친타수는 경기 종료 후</strong> 입력해주세요
    </div>

    <!-- ★ 성별 선택 추가 -->
    <div class="field">
      <label>성별</label>
      <div class="btn-row" style="gap:8px;">
        <button type="button" id="btnGenderM" class="btn btn-green btn-sm" onclick="selectGender('M')" style="flex:1;">♂ 남자</button>
        <button type="button" id="btnGenderF" class="btn btn-gray btn-sm" onclick="selectGender('F')" style="flex:1;">♀ 여자</button>
      </div>
    </div>

    <div class="btn-row" style="margin-top:4px">
      <button class="btn btn-gray btn-sm" onclick="loadMyData()">불러오기</button>
      <button class="btn btn-green btn-sm" onclick="saveMyScore()">저장하기</button>
    </div>
    <div id="scoreNotice" style="display:none" class="notice"></div>
  </div>
</div>

<div class="page" id="page-rank"> ... (기존 그대로) </div>

<!-- 관리자 페이지 (팀 편성 섹션 추가) -->
<div class="page" id="page-admin">
  <div id="adminLocked"> ... (기존 그대로) </div>
  <div id="adminUnlocked" style="display:none">
    <!-- 기존 내용 그대로 -->

    <!-- ★ 팀 편성 섹션 (관리자 전용) 추가 -->
    <div class="admin-section" style="border-color:#c9a84c; background:#fdf6e3; margin-top:14px;">
      <div class="card-title" style="color:#c9a84c;">🧑‍🤝‍🧑 팀 편성 (관리자 전용)</div>
      <div style="font-size:12px; color:#92400e; margin-bottom:10px;">
        4명씩 팀 구성 • 각 팀에 여성 1명 이상 • 핸디캡 비슷하게 편성
      </div>
      <button class="btn btn-gold btn-sm" onclick="autoFormTeams()">🚀 자동 팀 편성 실행</button>
    </div>

    <!-- 기존 admin 내용 그대로 유지 -->
    ... (기존 내용)
  </div>
</div>

<div class="sticky-bottom" id="stickyScore" style="display:none"> ... </div>

<script>
// 기존 변수 + 추가
let useFirebase = false, db = null, admin = false, currentRoom = "", localData = {}, published = false, currentTab = "room", allRooms = {}, autoPublishEnabled = false;
let selectedGender = 'M';   // ★ 추가

// 기존 코드 그대로 유지 (생략)

// ★ 성별 선택 함수 추가
function selectGender(gender) {
  selectedGender = gender;
  const btnM = document.getElementById('btnGenderM');
  const btnF = document.getElementById('btnGenderF');
  if (btnM && btnF) {
    btnM.className = gender === 'M' ? 'btn btn-green btn-sm' : 'btn btn-gray btn-sm';
    btnF.className = gender === 'F' ? 'btn btn-green btn-sm' : 'btn btn-gray btn-sm';
  }
}

// ★ saveMyScore 수정 (gender 추가 + 저장 후 참가자 탭 이동)
function saveMyScore() {
  // 기존 코드 그대로...
  const gender = selectedGender || 'M';

  if (useFirebase) {
    db.ref("rooms/" + currentRoom + "/players/" + name).set({ 
      name: name, handi: handi, score: score, gender: gender, timestamp: timestamp 
    }).then(() => {
      // 기존 알림 코드...
      setTimeout(() => switchTab('list'), 700);   // ★ 저장 후 자동 이동
    });
  } else {
    localData[name] = { name, handi, score, gender, timestamp };
    // 기존 코드...
    setTimeout(() => switchTab('list'), 700);   // ★ 저장 후 자동 이동
  }
}

// ★ 자동 팀 편성 함수 추가 (관리자만 가능)
function autoFormTeams() {
  if (!admin) { toast("관리자만 팀을 편성할 수 있습니다"); return; }
  if (!currentRoom) { toast("먼저 방에 입장하세요"); return; }

  const players = Object.values(localData || {});
  if (players.length < 4 || players.length % 4 !== 0) {
    toast("참가자는 4의 배수여야 합니다. (현재 " + players.length + "명)");
    return;
  }

  const numTeams = players.length / 4;
  let sorted = [...players].sort((a, b) => b.handi - a.handi);

  let teams = Array.from({length: numTeams}, (_, i) => ({ id: i+1, players: [], total: 0 }));

  // 팀장 배정 (높은 핸디)
  for (let i = 0; i < numTeams; i++) {
    teams[i].players.push(sorted[i]);
    teams[i].total += sorted[i].handi;
  }

  let remaining = sorted.slice(numTeams);
  let women = remaining.filter(p => p.gender === 'F');
  let men = remaining.filter(p => p.gender === 'M');

  // 여성 우선 배정
  women.sort((a, b) => a.handi - b.handi);
  for (let w of women) {
    let target = teams.find(t => !t.players.some(p => p.gender === 'F')) || 
                 teams.reduce((min, t) => t.total < min.total ? t : min);
    target.players.push(w);
    target.total += w.handi;
  }

  // 남은 선수 배정 (밸런싱)
  men.sort((a, b) => a.handi - b.handi);
  for (let p of men) {
    let target = teams.reduce((min, t) => t.total < min.total ? t : min);
    target.players.push(p);
    target.total += p.handi;
  }

  // 화면에 표시 (간단 버전)
  let html = teams.map(t => {
    return `<div style="margin-bottom:12px; padding:12px; border:1px solid #ddd; border-radius:8px;">
      <strong>팀 ${t.id}</strong> (총 핸디: ${t.total})<br>
      ${t.players.map(p => `${p.gender === 'F' ? '♀' : '♂'} ${p.name} (${p.handi})`).join('<br>')}
    </div>`;
  }).join('');

  const modal = document.createElement('div');
  modal.innerHTML = `<div style="position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,0.6); display:flex; align-items:center; justify-content:center; z-index:9999;" onclick="this.remove()">
    <div style="background:white; padding:20px; border-radius:12px; max-width:400px; width:90%;" onclick="event.stopImmediatePropagation()">
      <h3 style="margin-bottom:12px;">자동 팀 편성 결과</h3>
      ${html}
      <button onclick="this.closest('.modal').remove()" style="margin-top:10px; width:100%; padding:10px;">닫기</button>
    </div>
  </div>`;
  document.body.appendChild(modal.firstElementChild);

  if (useFirebase && currentRoom) {
    db.ref("rooms/" + currentRoom + "/teams").set(teams);
  }
  toast("✅ 팀 편성이 완료되었습니다!");
}

// 기존 모든 함수 그대로 유지 (listenRoom, renderParticipantList 등)
// ... (원본 코드의 나머지 부분 그대로)

// 초기 gender 버튼 설정
window.addEventListener("DOMContentLoaded", function() {
  var savedName = localStorage.getItem("myGolfName");
  if (savedName) document.getElementById("pName").value = savedName;

  const btnM = document.getElementById('btnGenderM');
  if (btnM) btnM.className = 'btn btn-green btn-sm';
});
</script>
</body>
</html>
